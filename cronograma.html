<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma</title>
    <link rel="stylesheet" href="cronograma.css">
</head>
<body>

    <header class="topo">
        <div class="logo">
             <h2>Crono<span class="vest">Vest</span></h2>
         </div>
 
         <button class="btn-voltar" onclick="voltarPagina()">
         < Voltar
     </button>

     <h1 class="titulo">Seu cronograma</h1>



     <div class="dias">

        <button class="btn-dia" data-dia="segunda">Segunda</button>
        <button class="btn-dia" data-dia="terca">Terça</button>
        <button class="btn-dia" data-dia="quarta">Quarta</button>
        <button class="btn-dia" data-dia="quinta">Quinta</button>
        <button class="btn-dia" data-dia="sexta">Sexta</button>
        <button class="btn-dia" data-dia="sabado">Sábado</button>
        <button class="btn-dia" data-dia="domingo">Domingo</button>

     </div>


    
    <script src="cronograma.js"></script>

     </div>
     

     <!-- NOVO: Seção de matérias (aparece quando seleciona um dia) -->
      <div class="materias-container">
        <div class="materias-header">
          <h2>Disciplinas de <span class="dia-selecionado">Segunda</span></h2>
        </div>

        <!-- NOVO: Lista de matérias com checkboxes -->
         <ul class="lista-materias" id="lista-materias">
             <!-- Os itens aparecem dinamicamente aqui -->
         </ul>

         <!-- NOVO: Barra de progresso -->
            <div class="progresso-container">
                <div class="progresso-"label>
                    <span>Progresso do dia</span>
                    <span class="progresso-percent">0%</span>
                </div>
                <div class="progresso-bar">
                    <div class="progresso-fill" style="width: 0%"></div>
                </div>
                
      </div>


    
</body>
</html>>
